name: my-health-compass

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: medical_app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medical_app"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Uncomment to reach Postgres from the host:
    # ports:
    #   - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/medical_app
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me-in-production-0123456789}
      UPLOAD_DIR: /app/uploads
      # Optional: enables Claude-powered chat intake (/intake/message).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Clinic EHR import (/external/ehr): upload auth + Gemini lab normalization.
      CLINIC_API_KEY: ${CLINIC_API_KEY:-dev-clinic-key-change-me}
      # Gemini auth, preferred first: gcloud ADC mounted below (Vertex AI),
      # else GEMINI_API_KEY (Developer API).
      GOOGLE_APPLICATION_CREDENTIALS: /gcloud/adc.json
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
    volumes:
      - uploads:/app/uploads
      # gcloud Application Default Credentials from the host. Override
      # GCLOUD_ADC_FILE in .env if yours lives elsewhere.
      - ${GCLOUD_ADC_FILE:-~/.config/gcloud/application_default_credentials.json}:/gcloud/adc.json:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    environment:
      # Optional: AI features (Ingestion Hub, ToxCheck, nutrition, search).
      LOVABLE_API_KEY: ${LOVABLE_API_KEY:-}

  nginx:
    build: ./nginx
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  pgdata:
  uploads:
