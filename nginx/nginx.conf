# Included into the http{} context by the stock nginx image (conf.d/*.conf).

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    server_name _;

    # Document/image uploads go through the API.
    client_max_body_size 25m;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # FastAPI. Trailing slash on proxy_pass strips the /api prefix;
    # the backend runs uvicorn with --root-path /api to match.
    location /api/ {
        proxy_pass http://backend/;
    }

    # TanStack Start SSR server.
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
